body:
  text: 髙士傳傳記類三總錄之屬提要臣等謹案髙士傳三巻晉皇甫謐撰謐字士安自號元晏先生安定朝那人漢太尉嵩之曾孫甞舉孝亷不行事迹具晉書本傳案南宋李石續博物志曰劉向傳列仙七十二人皇甫謐傳髙士亦七十二人知謐書本數僅七十二人此本所載乃多至九十六人然太平御覽五百六巻至五百九巻全收此書凡七十一人其七十人與此本相同又東郭先生一人此本無而御覽有合之得七十一人與李石所言之數僅佚其一耳葢御覽久無善本傳刋偶脱也此外子州支父石户之農小臣稷商容榮啟期長沮桀溺荷蓧丈人漢隂丈人顔觸十人皆御覽所引嵇康髙士傳之文閔貢王霸嚴光梁鴻臺佟韓康矯慎法真漢濱老父龎公十人則御覽所引後漢書之文惟被衣老􅆅庚桑楚林類老商氏莊周六人為御覽此部所未載當由後人雜取御覽又稍摭他書附益之耳考讀書志亦作九十六人而書録解題稱今自被衣至管寧惟八十七人是宋時已有二本竄亂非其舊矣流傳既乆未敢輕為刪削然其非七十二人之舊則不可以不知也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀髙士傳序孔子稱舉逸民天下之民歸心焉洪崖先生創髙道於上皇之代許由善巻不降節於唐虞之朝是以易有束帛之義禮有𤣥纁之制詩人發白駒之歌春秋顯子臧之節明堂月令以季春聘名士禮賢者然則髙讓之士王政所先厲濁激貪之務也史班之載多所闕略梁鴻頌逸民蘇順科髙士或録屈節雜而不純又近取秦漢不及逺古夫思其人猶愛其樹況稱其徳而贊其事哉謐采古今八代之士身不屈於王公名不耗於終始自堯至魏凡九十餘人雖執節若夷齊去就若兩龔皆不録也髙士傳序
