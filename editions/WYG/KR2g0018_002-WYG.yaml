body:
  text: 髙士傳巻中晉皇甫謐撰漢隂丈人漢隂丈人者楚人也子貢適楚過漢隂見丈人為圃入井抱甕而灌用力甚多而見功寡子貢曰有機於此後重前輕挈水若抽其名為橰用力寡而見功多丈人作色而笑曰聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也子貢愕然慙俯而不對有間丈人曰子奚為者耶曰孔丘之徒也丈人曰子非夫博學以擬聖智獨絃哀歌以賣名聲於天下乎汝方將忘汝神氣堕汝形骸而何暇治天下乎子往矣勿妨吾事子貢卑陬失色頊頊然不自得行三十里而後愈壺丘子林壺丘子林者鄭人也道徳甚優列禦寇師事之初禦寇好游壺丘子曰禦寇好游游何所好列子曰游之樂所玩無故人之游也觀其所見我之游也觀其所變壺丘子曰禦寇之游固與人同而曰固與人異凡所見亦恒見其變玩彼物之無故不知我亦無故務外游不知務内觀外游者求備於物内觀者取足於身取足於身游之至也求備於物游之不至也於是列子自以為不知游將終身不出居鄭圃四十年人無識者老商氏老商氏者不知何許人也列禦寇師焉兼友伯髙子而進于其道尹生聞之從列子居數月不省舎因問請蘄其術者十反而十不告尹生懟而請辭列子又不命尹生退數月意不巳又往從之列子曰汝何去來之頻尹生曰曩章戴有請於子子不我告固有憾於子今復脱然是以又來列子曰曩吾以汝為達今汝之鄙至此乎姬將告汝所學於夫子者矣自吾之學也三年之後心不敢念是非口不敢言利害始得老商一眄而已五年之後心庚念是非口庚言利害老商始一解顔而笑七年之後從心之所念庚無是非從口之所言庚無利害老商始一引吾並席而坐今女居先生之門曾未浹時履虚乗風其可幾乎列禦寇列禦寇者鄭人也隠居不仕鄭穆公時子陽為相專任刑法列禦寇乃絶迹窮巷面有飢色或告子陽曰列禦寇葢有道之士也居君之國而窮君無乃為不好士乎子陽聞而悟使官載粟數十乗而與之禦寇出見使者再拜而辭之入見其妻妻望之而拊心曰妾聞為有道之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈非命也哉禦寇笑曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也居一年鄭人殺子陽其黨皆死禦寇安然獨全終身不仕著書八篇言道家之意號曰列子莊周莊周者宋之蒙人也少學老子為蒙縣漆園吏遂遺世自放不仕王公大人皆不得而器之楚威王使大夫以百金聘周周方釣於濮水之上持竿不顧曰吾聞楚有神龜死二千嵗矣巾笥而藏之於廟堂之上此龜寧死為留骨而貴乎寧生曳尾塗中乎大夫曰寧掉尾塗中耳莊子曰往矣吾方掉尾於塗中或又以千金之幣迎周為相周曰子不見郊祭之犧牛乎衣以文繡食以芻菽及其牽入太廟欲為孤犢其可得乎遂終身不仕段干木段干木者晉人也少貧且賤心志不遂乃治清節遊西河師事卜子夏與田子方李克翟璜吳起等居于魏皆為將唯干木守道不仕魏文侯欲見就造其門段干木踰墻而避文侯文侯以客禮待之出過其廬而軾其僕問曰干木布衣也君軾其廬不已甚乎文侯曰段干木賢者也不移勢利懐君子之道隠處窮巷聲馳千里吾敢不軾乎干木先乎徳寡人先乎勢干木富乎義寡人富乎財勢不若徳貴財不若義髙又請為相不肯後巳固請見與語文侯立倦不敢息夫文侯名過齊桓公者葢能尊段干木敬卜子夏友田子方故也東郭順子東郭順子者魏人也修道守真田子方師事之而為魏文侯師友侍坐於文侯數稱谿工文侯曰谿工子之師耶子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰耶子方曰東郭順子也文侯曰然則夫子何故未嘗稱之子方曰其為人也真人貌而天虚縁而葆真清而容物物無道則正容以悟之使人之意也消無擇何足以稱之子方出文侯曰遠哉全徳之君子始吾以聖智之言仁義之行為至矣吾聞子方之師吾形解而不欲動口鉗而不欲言吾所學者真土梗耳夫魏真為我累耳公儀潛公儀潛者魯人也與子思為友穆公因子思而致命欲以為相子思曰公儀子此所以不至也君若飢渴待賢納用其謀雖蔬食飲水伋亦願在下風如以髙官厚禄為釣餌而無信用之心公儀子智若魯者可也不爾則不踰君之庭且臣不佞又不能為君操竿下釣以傷守節之士潛竟終身不屈王斗王斗者齊人也修道不仕與顔歜並時曾造齊宣王門欲見宣王宣王使謁者延斗入斗曰斗趨見王為好勢王趨見斗為好士於王何如謁者還報王曰先生徐之寡人請從王趨而迎之於門曰寡人奉先君之宗廟守社稷聞先生直言正諌不諱斗曰王之憂國愛民不若王之愛尺縠也王曰何謂也斗曰王使人為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺縠也王起謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也顔斶顔斶齊人也宣王見之王曰斶前斶亦曰王前宣王不説左右曰王人君也斶人臣也王曰斶前斶亦曰王前可乎斶對曰夫斶前為慕勢王前為趨士與使斶為慕勢不如使王為趨士王忿然作色曰王者貴乎士貴乎對曰士貴耳王者不貴王曰有説乎斶曰有昔者秦攻齊令曰有敢去栁下季壟五十步而樵採者死不赦令曰有能得齊王頭者封萬户侯賜金千鎰由是觀之生王之頭曾不若死士之壟也宣王繼曰顔先生與寡人遊食太牢乗安車妻子衣服麗都顔斶辭去曰斶願得歸晚食以當肉安步以當車無罪以當貴清淨貞正以自虞遂辭而去黔婁先生黔婁先生者齊人也修身清節不求進於諸侯魯恭公聞其賢遣使致禮賜粟三千鍾欲以為相辭不受齊王又禮之以黄金百斤聘為卿又不就著書四篇言道家之務號黔婁子終身不屈以夀終陳仲子陳仲子者齊人也其兄戴為齊卿食禄萬鍾仲子以為不義將妻子適楚居於陵自謂於陵仲子窮不茍求不義之食不食遭嵗饑乏糧三日乃匍匐而食井上李實之蟲者三咽而能視身自織履妻擘纑以易衣食楚王聞其賢欲以為相遣使持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我為相今日為相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過容膝食方丈於前所甘不過一肉今以容膝之安一肉之味而懐楚國之憂亂世多害恐先生不保命也於是出謝使者遂相與逃去為人灌園漁父漁父者楚人也楚亂乃匿名隠釣於江濱楚頃襄王時屈原為三閭大夫名顯於諸侯為上官靳尚所譖王怒放之江濱被髪行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至於斯原曰舉世混濁而我清衆人皆醉而我獨醒是以見放漁父曰夫聖人不凝滯於萬物故能與世推移舉世混濁何不揚其波汨其泥衆人皆醉何不餔其糟歠其醨何故懐瑾握瑜自令放為乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深山自閉匿人莫知焉安期生安期生者瑯琊人也受學河上丈人賣藥海邉老而不仕時人謂之千嵗公秦始皇東遊請與語三日三夜賜金璧直數千萬出置阜鄉亭而去留赤玉舄為報留書與始皇曰後數十年求我於蓬萊山下及秦敗安期生與其友蒯通交往項羽欲封之卒不肯受河上丈人河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故世號曰河上丈人當戰國之末諸侯交爭馳説之士咸以權勢相傾唯丈人隠身修道老而不虧傳業於安期生為道家之宗焉樂臣公樂臣公者宋人也其先宋公族其後别從趙其族樂毅顯名於諸侯而臣公獨好黄老恬靜不仕及趙為秦昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆尊事焉蓋公蓋公者齊之膠西人也明老子師事樂臣公漢之起齊人爭往于世主唯蓋公獨遁居不仕及漢定天下曹參為齊丞相盡延問長老諸生以百數何以治齊人人各殊參不知所從聞蓋公善治黄老乃使人厚幣聘之公為言治道貴清靜而民自定遂推此類為參具言之參悦乃避正堂舎之師事之齊果大治及參入相漢導蓋公之道故天下歌之蓋公雖為參師然未嘗仕以夀終四皓四皓者皆河内軹人也或在汲一曰東園公二曰角里先生三曰綺里季四曰夏黄公皆修道潔巳非義不動秦始皇時見秦政虐乃退入藍田山而作歌曰莫莫髙山深谷逶迤􅁮􅁮紫芝可以療飢唐虞世逺吾將何歸駟馬髙葢其憂甚大富貴之畏人不如貧賤之肆志乃共入商雒隠地肺山以待天下定及秦敗漢髙聞而徴之不至深自匿終南山不能屈巳黄石公黄石公者下邳人也遭秦亂自隠姓名時人莫知者初張良易姓為長自匿下邳步游沂水圯上與黄石公相遇未謁黄石公故墜履圯下顧謂良曰孺子取履良素不知詐愕然欲毆之為其老人也强忍下取履因跪進焉公以足受笑而去良殊驚公行里所還謂良曰孺子可敎也後五日平明與我期此良愈怪之復跪曰諾五日平旦良往公怒曰與老人期何後也後五日早㑹良雞鳴往公又先在復怒曰何後也後五日早㑹良夜半往有頃公亦至喜曰當如是乃出一編書與良曰讀是則為王者師矣後十三年孺子見濟北穀城山下黄石即我矣遂去不見良旦視其書乃是太公兵法良異之因講習以説他人皆不能用後與沛公遇於陳留沛公用其言輒有功後十三年從髙祖退濟北穀城山下得黄石良乃寶祠之及良死與石并葬焉魯二徴士魯二徴士者皆魯人也髙祖定天下即皇帝位博士叔孫通白徴魯諸儒三十餘人欲定漢儀禮二士獨不肯行罵通曰天下初定死者未葬傷者未起而欲起禮樂禮樂所由起百年之徳而後可舉吾不忍為公所為公所為不合古吾不行公往矣無汙我通不敢致而去田何田何字子莊齊人也自孔子授易五傳至何及秦禁學以易為卜筮之書獨不禁故何傳之不絶漢興田何以齊諸田徙杜陵號曰杜田生以易受弟子東武王同子仲洛陽周王孫丁寛齊服生等皆顯當世惠帝時何年老家貧守道不仕帝親幸其廬以受業終為易者宗王生王生者漢文景時人也善為黄老退居不仕與南陽張釋之交當時釋之為公車令太子與梁王共車入朝不下司馬門於是釋之劾奏太子梁王不敬文帝善之遷至廷尉及文帝崩太子代立為帝是謂景帝釋之恐稱病欲免去懼大誅至欲見謝則未知何如用王生計卒乃見上謝之景帝不過也王生嘗與釋之及公卿召㑹庭中立王生韈解顧謂釋之為我結韈釋之前跪而繋之既退或讓生曰獨奈何廷辱張廷尉使跪繋韈乎王生曰吾老且賤自度終無益於張廷尉張廷尉方今天下名臣吾故聊辱廷尉使跪繫韈欲以重之諸公聞之皆賢王生而重張廷尉摯峻摯峻字伯陵京兆長安人也少治清節與太史令司馬遷交好峻獨退身修徳隠於岍山遷既親貴乃以書勸峻進曰遷聞君子所貴乎道者三太上立徳其次立言其次立功伏惟伯陵材能絶人髙尚其志以善厥身冰清玉潔不以細行荷累其名固已貴矣然未盡太上之所由也願先生少致意焉峻報書曰峻聞古之君子料能而行度徳而處故悔恡去於身利不可以虚受名不可以茍得漢興以來帝王之道於斯始顯能者見利不肖者自屏亦其時也周易大君有命小人勿用徒欲偃仰從容以遊餘齒耳峻之守節不移如此遷居太史官為李陵遊説下腐刑果以悔恡被辱峻遂髙尚不仕卒於岍岍人立祠世奉祀之不絶韓福韓福者涿人也以行義修潔著名昭帝時將軍霍光秉政表顯義士郡國條奏行狀天子謂福等五人行義最髙以徳行徴至京兆病不得進元鳯元年詔策曰朕愍勞福以官職之事賜帛五十疋遣歸其務修孝弟以敎鄉里福歸終身不仕卒于家成公成公成帝時人自隠姓名常誦經不交世利時人號曰成公成帝出遊問之成公不屈節上曰朕能富貴人能殺人子何逆朕成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之禄陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇安丘望之安丘望之者京兆長陵人也少治老子經恬靜不求進宦號曰安丘丈人成帝聞欲見之望之辭不肯見上以其道徳深重常宗師焉望之不以見敬為髙愈日損退為巫醫於民間著老子章句故老氏有安丘之學扶風耿況王汲等皆師事之從受老子終身不仕道家宗焉宋勝之宋勝之者南陽安衆人也少孤年五嵗失父母家于穀城聚中孝慕甚篤聚中化之少長有禮勝之每行見老人擔負輒以身代之獵得禽獸嘗分肉與有親者貧依姊居數嵗乃至長安受易通明以信義見稱從兄褒為東平内史遣使召之勝之曰衆人所樂者非勝之願也乃去遊太原從郇越牧羊以琴書自娛丞相孔光聞而就太原辟之不至元始三年病卒于太原張仲蔚張仲蔚者平陵人也與同郡魏景卿俱修道徳隠身不仕明天官博物善屬文好詩賦常居窮素所處蓬蒿没人閉門養性不治榮名時人莫識唯劉龔知之嚴遵嚴遵字君平蜀人也隠居不仕常賣卜於成都市日得百錢以自給卜訖則閉肆下簾以著書為事揚雄少從之遊屢稱其徳李强為益州牧喜曰吾得君平為從事足矣雄曰君可備禮與相見其人不可屈也王鳯請交不許蜀有富人羅沖者問君平曰君何以不仕君平曰無以自發沖為君平具車馬衣糧君平曰吾病耳非不足也我有餘而子不足奈何以不足奉有餘沖曰吾有萬金子無儋石乃云有餘不亦謬乎君平曰不然吾前宿子家人定而役未息晝夜汲汲未嘗有足今我以卜為業不下牀而錢自至猶餘數百塵埃厚寸不知所用此非我有餘而子不足邪沖大慙君平嘆曰益我貨者損我神生我名者殺我身故不仕也時人服之彭城老父彭城老父者楚之隠人也見漢室衰乃自隠修道不治名利至年九十餘王莽時徴故光禄大夫龔勝欲為太子師友祭酒恥事二姓莽迫之勝遂不食而死莽使者及郡守以下㑹殮者數百人老父痛勝以名致禍乃獨入哭勝甚悲既而曰嗟乎薫以香自燒膏以明自銷龔先生竟夭天年非吾徒也哭畢而趨出衆莫知其誰也韓順韓順字子良天水成紀人也以經行清白辟州宰不詣王莽末隠於南山地皇四年漢起兵於南陽順同縣隗囂等起兵自稱上將軍西州大震唯順修道山居執操不回囂以道術深逺使人齎璧帛卑辭厚禮聘順欲以為師順因使謝囂曰禮有來學義無往教即欲相師但入深山來囂聞矍然不致强屈其後囂等諸姓皆滅唯順山棲安然以貧潔自終焉鄭樸鄭樸字子真谷口人也修道靜黙世服其清髙成帝時元舅大將軍王鳯以禮聘之遂不屈揚雄盛稱其徳曰谷口鄭子真耕於巖石之下名振京師馮翊人刻石祠之至今不絶李𢎞李𢎞字仲元蜀人也居成都里中化之班白不負擔男女不錯行𢎞嘗被召為縣令鄉人共送之元無心就行因共酣飲月餘不去刺史使人喻之仲元遂遊奔不之官惟揚雄重之曰不夷不惠居于可否之間向長向長字子平河内朝歌人也隠居不仕性尚中和好通老易貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦之於莽固辭乃止潛隠於家讀易至損益卦喟然歎曰吾巳知富不如貧貴不如賤但未知死何如生耳建武中男女嫁娶既畢敕㫁家事勿相關當如我死也於是遂肆意與同好北海禽慶俱遊五嶽名山竟不知所終閔貢閔貢字仲叔太原人也世稱節士雖周黨之潔清自以弗及也黨見仲叔食無菜遺以生蒜仲叔曰我欲省煩耳今更作煩邪受而不食建武中應司徒侯霸之辟既至霸不及政事徒勞苦而已仲叔恨曰以仲叔為不足問也不當辟也辟而不問是失人邪遂辭出投檄而去復以博士徴不至客居安邑老病家貧不能得肉日買猪肝一片屠者或不肯與其令聞敕吏常給焉仲叔怪問知之乃歎曰閔仲叔豈以口腹累安邑邪遂去客沛以夀終髙士傳巻中
