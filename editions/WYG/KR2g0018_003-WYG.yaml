body:
  text: 髙士傳巻下晉皇甫謐撰王霸王霸字儒仲太原廣武人也少立清節及王莽篡位棄冠帶絶交宦建武中徴到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣諸侯有所不友司徒侯霸讓位於霸故梁令閻陽毁之曰太原俗黨儒仲頗有其風遂止以病歸隠居守志茅屋蓬戸連徴不至以夀終嚴光嚴光字子陵㑹稽餘姚人也少有髙名同光武遊學及帝即位光乃變易姓名隠逝不見帝思其賢乃物色求之後齊國上言有一男子披羊裘釣澤中帝疑光也乃遣安車𤣥纁聘之三反而後至司徒霸與光素舊欲屈光到霸所語言遣使西曹屬侯子道奉書光不起於牀上箕踞抱膝發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位已鼎足不癡也光曰遣卿來何言子道傳霸言光曰卿言不癡是非癡語也天子徴我三乃來人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之使者嫌少可更足光曰買菜乎求益也霸封奏其書帝笑曰狂奴故態也車駕即日幸其館光卧不起帝即卧所撫其腹曰咄咄子陵不可相助為理邪光又眠不應良久乃張目而言曰昔唐堯著徳巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝邪於是升輿歎息而去復引光入論道舊故相對累日因共偃卧除為諌議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨焉建武十七年復特徴不至年八十終於家牛牢牛牢字君直世祖為布衣時與牢交遊嘗夜共講説䜟言云劉秀當為天子世祖曰安知非我萬一果然各言爾志牢獨黙然世祖問之牢曰丈夫立義不與帝友衆大笑及世祖即位徴牢稱疾不至詔曰朕幼交牛君真清髙士也恒有疾州郡之官常先到家致意焉刺史郡守是以每輒奉詔就家存問牢恒被髪稱疾不答詔命東海隠者東海隠者不知何許人也漢故司直王良之友建武中良以清節徴用歴位至一年復還通友不肯見而讓之曰不有忠信竒謀而取大位自知無徳曷為致此而復遽去何往來屑屑不憚煩也遂距良終身不納論者髙之梁鴻梁鴻字伯鸞扶風平陵人也遭亂世受業太學博覽不為章句學畢乃牧豕上林苑中曾誤遺火延及他舎鴻乃尋訪燒者問其所去失悉以豕償之其主猶為少鴻又以身居作執勤不懈鄰家耆老見鴻非恒人乃共責讓主人而稱鴻長者於是始敬異焉悉還其豕鴻不受而去歸鄉里埶家慕其髙節多欲女之鴻並絶不娶同縣孟氏有女狀醜擇對不嫁父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之及嫁始以裝飾入門七日而鴻不答妻乃跪請鴻曰吾欲裘褐之人可與俱隠深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隠居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰徳曜名孟光居有頃乃共入霸陵山中以耕織為業詠詩書彈琴以自娛仰慕前世髙士而為四皓以來二十四人作頌因東出關過京師作五噫之歌肅宗求鴻不得乃易姓運期名耀字侯光與妻子居齊魯之間有頃又去適吳居臯伯通廡下為人賃舂每歸妻為具食舉案齊眉伯通察而異之乃方舎之於家鴻潛閉著書十餘篇疾且困告主人曰昔延陵季子葬子於嬴博之間不歸鄉里慎勿令我子持喪歸去及卒伯通等為求葬地於吳要離冡傍髙恢髙恢字伯達京兆人也少治老子經恬虚不營世務與梁鴻善隠於華隂山中及鴻東游思恢作詩曰鳥嚶嚶兮友之期念髙子兮僕懐思想念恢兮爰集兹二人遂不復相見恢亦髙抗匿燿終身不仕焉臺佟臺佟字孝威魏郡鄴人也不仕隠武安山中峯鑿穴而居采藥自業建初中州辟不就魏郡刺史執棗栗為贄見佟語良久刺史曰孝威居身如此甚苦如何佟曰佟幸得保終正性存神養和不屏營於世事以勞其精除可欲之志恬淡自得不苦也如明使君綏撫牧養夕惕匪忒反不苦耶遂去隠逸終身不見韓康韓康字伯休京兆霸陵人也常遊名山采藥賣於長安市中口不二價者三十餘年時有女子買藥於康怒康守價乃曰公是韓伯休邪乃不二價乎康歎曰我欲避名今區區女子皆知有我何用藥為遂遯入霸陵山中博士公車連徴不至桓帝時乃備𤣥纁安車以聘之使者奉詔造康康不得巳乃佯許諾辭安車自乗柴車冒晨先發至亭亭長以韓徴君當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪乃止康因中路逃遁以夀終丘訢丘訢字季春扶風人也少有大材自謂無伍傲世不與俗人為羣郡守始召見曰明府欲臣訢耶友訢邪師訢邪明府所以尊寵人者極於功曺所以榮禄人者巳於孝亷一極一已皆訢所不用也郡守異之遂不敢屈矯慎矯慎字仲彦扶風茂陵人也少慕松喬導引之術隠遯山谷與南郡太守馬融并州刺史蘇章鄉里並時然二人純遠不及慎也汝南吳蒼甚重之因遺書以觀其志曰葢聞黄老之言乗虚入㝠藏身遠遯亦有理國養人施於為政至如登山絶迹神不著其證人不覩其驗吾欲先生從其可者於意何如昔伊尹不懐道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳯翔嬉雲間者亦非狐兔燕雀所敢謀也慎不答年七十餘竟不肯娶後忽歸家自言死日及期果卒後人有見慎於燉煌者故前世異之或云神仙焉慎同郡馬瑤隠於汧山以兔罝為事所居俗化百姓美之號馬牧先生焉任棠任棠字季卿少有竒節以春秋教授隠身不仕龎參為漢陽太守到先就家俟焉棠不與言但以薤一本水一盂置户屏前自抱孫兒伏於户下主簿白以為倨傲參思其為意良久曰棠置一盂水者欲諭太守清也投一本薤者欲諭太守擊强宗也抱孫兒當户者欲諭太守開門䘏幼也終參去不言詔徴不至及卒鄉人圖畫其形至今稱任徴君也贄恂贄恂字季直伯陵之十二世孫也明禮易遂治五經博通百家之言又善屬文詞論清美渭濱弟子扶風馬融沛國桓驎等自逺方至者十餘人既通古今而性復温敏不恥下問故學者宗之嘗慕其先人之髙遂隠於南山之隂初馬融如恂受業恂愛其才因以女妻之融後果為大儒文魁當世以是服恂之知人永和中常博求名儒公卿薦恂行侔顔閔學擬仲舒文參長卿才同賈誼實瑚璉器也宜在宗廟為國碩輔由是公車徴不詣大將軍竇武舉賢良不就清名顯於世以夀終三輔稱奬法真法真字髙卿扶風郿人也學無常家博通内外圖典關西號為大儒弟子自逺而負笈嘗數百人真性恬靜寡欲不涉人間事太守請見之真乃輻巾詣謁太守曰昔魯哀公雖為不肖而仲尼稱臣太守虛薄欲以功曺相屈光贊本朝何如真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣太守戄然不敢復言凡辟公府賢良皆不就同郡田羽薦真曰處士法真體兼四業學窮典奥幽居恬泊樂以忘憂將蹈老氏之髙蹤不為𤣥纁屈也臣願聖明就加衮職必能唱清廟之歌致來儀之鳯矣㑹順帝西巡羽又薦之帝虛心欲致前後四徴真曰吾既不能遯形逺世豈飲洗耳之水哉遂深自隠絶終不降屈友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣乃共刋石頌之號曰𤣥徳先生年八十九中平五年以夀終漢濱老父漢濱老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張温異之使問曰人皆來觀老父獨不輟何也老父笑而不答温下道百步自與言老父曰我野人也不達斯語請問天下亂而立天子耶理而立天子邪立天子以父天下邪役天下以奉天子邪昔聖王宰世茅茨采椽而萬人以寧今子之君勞人自縱逸遊無忌吾為子羞之子何忍欲人觀之乎温大慙問其姓名不告而去徐穉徐穉字孺子豫章南昌人也少以經行髙於南州桓帝時汝南陳蕃為豫章太守因推薦穉於朝廷由是五舉孝亷賢良皆不就連辟公府不詣未嘗答命公薨輒身自赴弔太守黄瓊亦嘗辟穉至瓊薨歸葬江夏穉既聞即負笈徒步豫章三千餘里至江夏瓊墓前致酹而哭之後公車三徴不就以夀終夏馥夏馥字子治陳留圉人也少為諸生質直不茍動必依道同縣髙儉及蔡氏凡二家豪富郡人畏事之唯馥閉門不與髙蔡通桓帝即位災異數發詔百司舉直言之士各一人太尉趙戒舉馥不詣遂隠身久之靈帝即位中常侍曺節等專朝禁錮善士謂之黨人馥雖不交時官然聲名為節等所憚遂與汝南范滂山陽張儉等數百人並為節所誣悉在黨中詔下郡縣各捕以為黨魁馥乃頓足而嘆曰孽自巳作空汙良善一人逃死禍及萬家何以生為乃自翦鬚變服易形入林慮山中為冶工客作形貌毁悴積傭三年而無知者後詔委放儉等皆出馥獨歎曰已為人所棄不宜復齒鄉里矣留賃作不歸家人求不知處其後人有識其聲者以告同郡止鄉太守濮陽潛使人以車迎馥馥自匿不肯潛車三返乃得馥郭太郭太字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以為吏歎曰丈夫何能執鞭斗筲哉乃辭母與同縣宗仲至京師從屈伯彦學春秋博洽無不通又審於人物由是名著於陳梁之間步行遇雨巾一角墊衆人慕之皆故折巾角士爭往從之載䇿盈車凡太知之于無名之中六十餘人皆言後驗以母喪歸徐穉來弔以生芻一束頓太廬前而去太曰此必南州髙士徐孺子也詩不云乎生芻一束其人如玉吾不堪此喻耳凡司徒辟大常趙典舉有道皆不就以建寧二年卒於家申屠蟠申屠蟠字子龍陳留外黄人也少有名節同縣緱氏女玉為父報讐外黄令梁配欲論殺玉蟠時年十五為諸生進諌曰玉之節義足以感無恥之孫激忍辱之子不遭明時尚當表旌廬墓況在清聽而不加哀矜配善其言乃為讞得減死論鄉人稱之蟠父母卒哀毁思慕不飲酒食肉十餘年遂隠居學治京氏易嚴氏春秋小戴禮三業先通因博貫五經兼明圖緯學無常師始與濟隂王子居同在太學子居病困以身託蟠蟠即步負其喪至濟隂遇司𨽻從事於河鞏之間從事義之為符傳護送蟠蟠不肯投傳於地而去事畢還家前後凡蒲車特徴皆不就年七十四以夀終袁閎袁閎字夏甫汝南人也築室於庭中閉門不見客旦暮於室中向母禮拜雖子往亦不得見也子亦向户拜而去首不著巾身無單衣足著木履母死不列服位公車兩徴不詣范滂美而稱之曰隠不違親貞不絶俗可謂至賢矣姜肱姜肱字伯淮彭城廣戚人也家世名族兄弟三人皆孝行著聞肱年最長與二弟仲海季江同被卧甚相親友及長各娶兄弟相愛不能相離肱習學五經兼明星緯弟子自逺方至者三千餘人聲重於時凡一舉孝亷十辟公府九舉有道至孝賢良公車三徴皆不就仲季亦不應徴辟建寧二年靈帝詔徴為犍為太守肱得詔乃告其友曰吾以虛獲實遂籍聲價盛明之世尚不委質況今政在私門哉乃隠身遯命乗船浮海使者追之不及再以𤣥纁聘不就即拜太中大夫又逃不受詔名振于天下年七十七卒於家管寧管寧字幼安北海朱虚人也靈帝末以中國方亂乃與其友邴原涉海依遼東太守公孫度虚館禮之其後中國少安人多南歸唯寧不還黄初中華歆薦寧寧知公孫淵必亂乃因徴辭還以為太中大夫固辭不就寧凡徴命十至輿服四賜常坐一木榻上積五十五年未嘗箕踞榻上當膝皆穿常著布裙貉裘唯祠先人乃著舊布單衣加首絮巾遼東郡國圖形於府殿號為賢者鄭𤣥鄭𤣥字康成北海髙密人也八世祖崇漢尚書𤣥少好學長八尺餘須眉美秀姿容甚偉習孝經論語兼通京氏公羊春秋三正厯九章算術周官禮記左氏春秋大將軍何進辟𤣥州郡迫脅不得已而詣進設几杖之禮以待𤣥𤣥以幅巾見進一宿而逃去公府前後十餘辟並不就任安任安字定祖少好學隠山不營名利時人稱安曰任孔子連辟不就建安中讀史記魯連傳歎曰性以潔白為治情以得志為樂性治情得體道而不憂彼棄我取與時而無爭遂終身不仕時人號為任徴君云龎公龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賓荆州刺史劉表延請不能屈乃就候之曰夫保全一身孰若保全天下乎龎公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趣舎行止亦人之巢穴也且各得其棲宿而巳天下非所保也因釋耕於壟上而妻子耘於前表指而問曰先生苦居􅅵畆而不肯官禄後世何以遺子孫乎龎公曰世人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後遂攜其妻子登鹿門山因采藥不反姜岐姜岐字子平漢陽上邽人也少失父獨以母兄居治書易春秋恬居守道名重西州延熹中沛國橋𤣥為漢陽太守召岐欲以為功曹岐稱病不就𤣥怒敕督郵尹益收岐若不起者趣嫁其母而後殺岐益爭之𤣥怒益撾之益得杖且諫曰岐少修孝義棲遲衡廬鄉里歸仁名宣州里實無罪狀益敢以死守之𤣥怒乃止岐於是髙名逾廣其母死喪禮畢盡讓平水田與兄岑遂隠居以畜蜂豕為事教授者滿於天下營業者三百餘人辟州從事不詣民從而居之者數千家後舉賢良公府辟以為茂才為蒲坂令皆不就以夀終于家荀靖荀靖字叔慈潁川人也少有雋才以孝著名兄弟八人號曰八龍闔門悌睦隠身修學動止合禮弟爽字慈明亦以才顯於當時或問汝南許章曰爽與靖孰賢章曰皆玉也慈明外朗叔慈内潤太尉辟不就及卒學士惜之誄靖者二十六人潁隂令丘禎追號靖曰𤣥行先生潁川太守王懐亦諡曰昭定先生胡昭胡昭字孔明潁川人也始避地冀州不應袁紹之命武帝亦辟昭昭自陳本志帝曰人各有志出處不同勉卒髙尚義不相屈昭乃隠陸渾山中躬耕樂道以經籍自娛至嘉平初年八十九卒于家焦先焦先字孝然世莫知其所出也或言生漢末及魏受禪常結草為廬於河之湄獨止其中冬夏袒不著衣卧不設席又無蓐以身親土其體垢汗皆如泥滓不行人間或數日一食行不由邪徑目不與女子迕視口未嘗言雖有警急不與人語後野火燒其廬先因露寢遭冬雪大至先袒卧不移人以為死就視如故後百餘嵗卒髙士傳巻下
