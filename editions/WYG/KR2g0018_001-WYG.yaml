body:
  text: 髙士傳巻上晉皇甫謐撰被衣被衣者堯時人也堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣齧缺問道乎被衣被衣曰若正汝形一汝視天和將至攝汝知一汝度神將來舎徳將為汝美道將為汝居汝瞳焉如新生之犢而無求其故言未卒齧缺睡寐被衣大悦行歌而去之曰形若槁骸心若死灰真其實知不以故自持媒媒晦晦無心而不可與謀彼何人哉王倪王倪者堯時賢人也師被衣齧缺又學於王倪問道焉齧缺曰子知物之所同是乎曰吾惡乎知之子知子之所不知邪曰吾惡乎知之然則物無知邪曰吾惡乎知之雖然嘗試言之庸詎知吾所謂知之非不知邪庸詎知吾所謂不知之非知邪且吾嘗試問乎汝民溼寢則腰疾偏死鰌然乎哉木處則惴慄怐懼猨猴然乎哉三者孰知正處民食芻豢麋鹿食薦蝍且甘帶鴟鴉嗜鼠四者孰知正味猨猵狙以為雌麋與鹿交鰌與魚遊毛嬙麗姬人之所美也魚見之深入鳥見之髙飛麋鹿見之決驟四者孰知天下之正色哉自我觀之仁義之端是非之塗樊然殽亂吾惡能知其辯齧缺曰子不知利害則至人固不知利害乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山風振海而不能驚若然者乗雲氣騎日月而遊乎四海之外死生無變於巳而況利害之端乎齧缺齧缺者堯時人也許由師事齧缺堯問於由曰齧缺可以配天乎吾藉王倪以要之許由曰殆哉圾乎天下齧缺之為人也聰明睿知給數以敏其性過人而又乃以人受天彼審乎禁過而不知過之所由生與之配天乎彼且乗人而無天方且本身而異形方且尊知而火馳方且為緒使方且為物絯方且四顧而物應方且應衆宜方且與物化而未始有恒夫何足以配天乎巢父巢父者堯時隠人也山居不營世利年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隠汝形藏汝光若非吾友也擊其膺而下之由悵然不自得乃過清泠之水洗其耳拭其目曰向聞貪言負吾之友矣遂去終身不相見許由許由字武仲陽城槐里人也為人據義履方邪席不坐邪饍不食後隠於沛澤之中堯讓天下於許由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎夫子立而天下治而我猶尸之吾自視缺然請致天下許由曰子治天下天下既巳冶也而我猶代子吾將為名乎名者實之賓也吾將為賓乎鷦鷯巢於深林不過一枝偃鼠飲河不過滿腹歸休乎君予無所用天下為庖人雖不治庖尸祝不越樽俎而代之矣不受而逃去齧缺遇許由曰子將奚之曰將逃堯曰奚謂邪曰夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣由於是遁耕於中岳潁水之陽箕山之下終身無輕天下色堯又召為九州長由不欲聞之洗耳於潁水濱時其友巢父牽犢欲飲之見由洗耳問其故對曰堯欲召我為九州長惡聞其聲是故洗耳巢父曰子若處髙岸深谷人道不通誰能見子子故浮游欲聞求其名譽汚吾犢口牽犢上流飲之許由没葬箕山之巔亦名許由山在陽城之南十餘里堯因就其墓號曰箕山公神以配食五岳世世奉祀至今不絶也善巻善巻者古之賢人也堯聞得道乃北面師之及堯受終之後舜又以天下讓巻巻曰昔唐氏之有天下不敎而民從之不賞而民勸之天下均平百姓安靜不知怨不知喜今子盛為衣裳之服以眩民目繁調五音之聲以亂民耳丕作皇韶之樂以愚民心天下之亂從此始矣吾雖為之其何益乎予立于宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞動秋收斂身足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為哉悲夫子之不知余也遂不受去入深山莫知其處子州支父子州支父者堯時人也堯以天下讓許由許由不受又讓於子州支父子州支父曰以我為天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也舜又讓之亦對之曰予適有幽憂之病方且治之未暇治天下也壤父壤父者堯時人也帝堯之世天下太和百姓無事壤父年八十餘而擊壤於道中觀者曰大哉帝之徳也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何徳於我哉石户之農石户之農不知何許人也與舜為友舜以天下讓之石戸之農石户之農曰捲捲乎后之為人葆力之士也於是夫負妻戴攜子以入于海終身不反也蒲衣子蒲衣子者舜時賢人也年八嵗而舜師之齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏有虞氏其猶藏仁以要人亦得人矣而未始出於非人泰氏其卧徐徐其覺于于一以已為馬一以已為牛其知情信其徳甚真而未始入于非人也後舜讓天下於蒲衣子蒲衣子不受而去莫知所終披裘公披裘公者吳人也延陵季子出遊見道中有遺金顧披裘公曰取彼金公投鎌瞋目拂手而言曰何子處之髙而視人之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰吾子皮相之士何足語姓名也江上丈人江上丈人者楚人也楚平王以費無忌之讒殺伍奢奢子員亡將奔吳至江上欲渡無舟而楚人購員甚急自恐不脱見丈人得渡因解所佩劍以與丈人曰此千金之劍也願獻之丈人不受曰楚國之法得伍胥者爵執珪金千鎰吾尚不取何用劍為不受而别莫知其誰員至吳為相求丈人不能得每食輒祭之曰名可得聞而不可得見其唯江上丈人乎小臣稷小臣稷者齊人也抗厲希古桓公凡三往而不得見公嘆曰吾聞布衣之士不輕爵禄則無以助萬乗之主萬乗之主不好仁義則無以下布衣之士於是五往乃得見焉桓公以此能致士為五霸之長弦髙弦髙者鄭人也鄭穆公時髙見鄭為秦晉所逼乃隠不仕為商人及晉文公之返國也與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫把子等三人戍鄭居三年晉文公卒襄公初立秦穆公方强使百里西乞白乙帥師襲鄭過周反滑鄭人不知時髙將市于周遇之謂其友蹇他曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情也必不敢進矣於是乃矯鄭伯之命以十二牛犒秦師且使人告鄭為備把子亡奔齊孟明等返至都晉人要擊大破秦師鄭於是賴髙而存鄭穆公以存國之賞賞髙而髙辭曰詐而得賞則鄭國之政廢矣為國而無信是敗俗也賞一人而敗國俗智者不為也遂以其屬徙東夷終身不返商容商容不知何許人也有疾老子曰先生無遺敎以告弟子乎容曰將語子過故鄉而下車知之乎老子曰非謂不忘故耶容曰過喬木而趨知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存曰吾齒存乎曰亡知之乎老子曰非謂其剛亡而弱存乎容曰嘻天下事盡矣老子李耳老子李耳字伯陽陳人也生於殷時為周柱下史好養精氣貴接而不施轉為守蔵史積八十餘年史記云二百餘年時稱為隠君子諡曰耼仲尼至周見老子知其聖人乃師之後周徳衰乃乗青牛車去入大秦過西關關令尹喜望氣先知焉乃物色遮候之巳而老子果至乃强使著書作道徳經五千餘言為道家之宗以其年老故號其書為老子庚桑楚庚桑楚者楚人也老耼弟子偏得老耼之道以北居畏壘之山其居三年畏壘大穰畏壘之民相與言曰庚桑子之始來吾灑然異之今吾日計之而不足嵗計之而有餘庶幾其聖人乎子胡不相與尸而祝之社而稷之乎庚桑子聞之南面而不䆁然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣吾聞至人尸居環堵之室而百姓猖狂不知所如往今以畏壘之細民而竊竊焉欲俎豆予于賢人之間我其杓之人邪吾是以不釋于老耼之言老萊子老萊子者楚人也當時世亂逃世耕於蒙山之陽莞葭為墻蓬蒿為室枝木為牀蓍艾為席飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊曰然妻曰妾聞之可食以酒肉者可隨而鞭棰可擬以官禄者可隨而鈇鉞妾不能為人所制者妻投其畚而去老萊子亦隨其妻至於江南而止曰鳥獸之毛可績而衣其遺粒足食也仲尼嘗聞其論而蹙然改容焉著書十五篇言道家之用人莫知其所終也林類林類者魏人也年且百嵗底春被裘拾遺穗於故畦並歌並進孔子適衛望之於野顧謂弟子曰彼叟可與言者試往試之子貢請行逆之隴端面之而歎曰先生曾不悔乎而行歌拾穗林類行不留歌不輟子貢叩之不已乃仰而應曰吾何悔邪子貢曰先生少不勤行長不競時老無妻子死期將至亦有何樂而拾穗行歌乎林類笑曰吾之所以為樂人皆有之而反以為憂少不勤行長不競時故能夀若此老無妻子死期將至故能樂若此子貢曰夀者人之情死者人之惡子以死為樂何也林類曰死之與生一往一反故死於是者安知不生於彼故吾知其不相若矣吾又安知營營而求生非惑乎亦又安知吾今之死不愈昔之生乎子貢聞之不喻其意還以告夫子夫子曰吾知其可與言果然榮啟期榮啟期者不知何許人也鹿裘帶索鼓琴而歌孔子遊于泰山見而問之曰先生何樂也對曰吾樂甚多天生萬物唯人為貴吾得為人矣是一樂也男女之别男尊女卑故以男為貴吾既得為男矣是二樂也人生有不見日月不免襁褓者吾既巳行年九十矣是三樂也貧者士之常也死者民之終也居常以待終何不樂也荷蕢荷蕢者衛人也避亂不仕自匿姓名孔子擊磬於衛乃荷蕢而過孔氏之門曰有心哉擊磬乎既而曰硜硜乎莫已知也斯已而巳矣深則厲淺則揭孔子聞之曰果哉末之難矣長沮桀溺長沮桀溺者不知何許人也耦而耕孔子過之使子路問津焉長沮曰夫執輿者為誰子路曰是孔丘曰是魯孔丘歟曰是也是知津矣問於桀溺曰子為誰曰為仲由曰是魯孔丘之徒與對曰然曰滔滔者天下皆是也而誰與易之且而與其從避人之士豈若從避世之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可與同羣吾非斯人之徒而誰與天下有道丘不與易也石門守石門守者魯人也亦避世不仕自隠姓名為魯守石門主晨夜開閉子路從孔子石門而宿問子路曰奚自子路曰自孔氏遂譏孔子曰是知其不可為而為之者與時人賢焉荷篠丈人荷篠丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而芸子路拱而立止子路宿且享焉而見其二子明日子路行以告夫子曰隠者也使子路反見之至則行矣陸通陸通字接輿楚人也好養性躬耕以為食楚昭王時通見楚政無常乃佯狂不仕故時人謂之楚狂孔子適楚楚狂接輿遊其門曰鳯兮鳯兮何如徳之衰也來世不可待徃世不可追也天下有道聖人成焉天下無道聖人生焉方今之時僅免刑焉福輕乎羽莫之知載禍重乎地莫之知避巳乎已乎臨人以徳殆乎殆乎畫地而趨迷陽迷陽無傷吾行郤曲郤曲無傷吾足山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而不知無用之用也孔子下車欲與之言趨而避之不得與之言楚王聞陸通賢遣使者持金百鎰車馬二駟往聘通曰王請先生治江南通笑而不應使者去妻從市來曰先生少而為義豈老違之哉門外車跡何深也妾聞義士非禮不動妾事先生躬耕以自食親織以為衣食飽衣暖其樂自足矣不如去之於是夫負釡甑妻戴絍器變名易姓游諸名山食桂櫨實服黄菁子隠蜀峩眉山夀數百年俗傳以為仙云曾參曾參字子輿南武城人也不仕而遊居於衛緼袍無表顔色腫噲手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵决曳縰而歌天子不得臣諸侯不得友魯哀公賢之致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎終不受後卒于魯顔回顔回字子淵魯人也孔子弟子貧而樂道退居陋巷曲肱而寢孔子曰回來家貧居卑胡不仕乎回對曰不願仕回有郭外之田五十畝足以給饘粥郭内之圃十畝足以為絲麻鼓宫商之音足以自娛習所聞於夫子足以自樂回何仕焉孔子愀然變容曰善哉回之意也原憲原憲字子思宋人也孔子弟子居魯環堵之室茨以生草蓬戸不完桑以為樞而甕牖二室褐以為塞上漏下濕匡坐而彈琴子貢相衛結駟連騎排藜藿入窮閭巷不容軒來見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病也憲應之曰憲聞之無財謂之貧學道而不能行謂之病若憲貧也非病也夫希世而行比周而友學以為人敎以為巳仁義之慝輿馬之飾憲不忍為也子貢逡巡而有慚色終身恥其言之過也髙士傳巻上
