front:
  text: 序孔子稱舉逸民天下之民歸心焉洪崖先生創高道於上皇之代許由善卷不降節於唐虞之朝是以易有束帛之義禮有玄纁之制詩人發白駒之歌春秋顯子臧之節明當月令以季春聘名士禮賢者然則高讓之士王政所先厲濁激貪之務也史班之載多所闕略梁鴻頌逸民蘇順科高士或録屈節雜而不純又近取秦漢不及遠古夫思其人猶愛其樹況稱其德而贊其事哉謐采古今八代之士身不屈於王公名不耗於終始自堯至魏凡九十餘人雖執節若夷齊去就若兩龔皆不録也
